<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0a0e1a; /* Dark Background like video */
        }
        .card-dark {
            background-color: #161b2c;
            border: 1px solid #232a3d;
        }
        .input-dark {
            background-color: #1e2538;
            border: 1px solid #2d364f;
            color: white;
        }
        .input-dark::placeholder {
            color: #4b5563;
        }
        /* Menghilangkan scrollbar tapi tetap bisa scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        @media print {
            .no-print { display: none; }
            body { background: white; color: black; }
            .card-dark { border: 1px solid #ccc; background: white; }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-32">

    <!-- Header & Logo Section -->
    <div class="p-6 flex flex-col items-center gap-4 no-print">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
            </div>
            <h1 class="text-xl font-extrabold uppercase tracking-tight text-white">Kartu Stock <span class="text-indigo-500">Pro</span></h1>
        </div>

        <!-- Target Indicator -->
        <div class="card-dark px-6 py-3 rounded-2xl flex items-center gap-4 w-full max-w-xs justify-center">
            <div class="text-right">
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Target Minimum</p>
                <input type="number" id="targetVal" value="100" oninput="updateUI()" class="bg-transparent text-lg font-black text-white w-16 outline-none text-right">
            </div>
            <div class="h-8 w-[1px] bg-slate-700"></div>
            <div id="statusIcon" class="text-amber-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
            </div>
        </div>
    </div>

    <!-- Info Section (Grid 2 Kolom seperti video) -->
    <div class="px-4 grid grid-cols-2 gap-3 mb-6">
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Kode Bahan</label>
            <input type="text" value="Bontax" class="bg-transparent w-full font-bold text-sm outline-none text-white">
        </div>
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Tgl Ambil</label>
            <input type="text" value="26/3/26" class="bg-transparent w-full font-bold text-sm outline-none text-white">
        </div>
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Tgl Kembali</label>
            <input type="text" placeholder="-" class="bg-transparent w-full font-bold text-sm outline-none text-white italic">
        </div>
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Kode Bahan Baru</label>
            <input type="text" value="250" class="bg-transparent w-full font-bold text-sm outline-none text-white">
        </div>
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Jenis Bahan</label>
            <input type="text" value="L49" class="bg-transparent w-full font-bold text-sm outline-none text-white">
        </div>
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Mesin</label>
            <input type="text" placeholder="-" class="bg-transparent w-full font-bold text-sm outline-none text-white">
        </div>
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Sisa Bahan</label>
            <input type="text" placeholder="-" class="bg-transparent w-full font-bold text-sm outline-none text-white">
        </div>
        <div class="card-dark p-4 rounded-2xl">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Nama Operator</label>
            <input type="text" placeholder="-" class="bg-transparent w-full font-bold text-sm outline-none text-white">
        </div>
    </div>

    <!-- Input Fields (Full Width seperti video) -->
    <div class="px-4 space-y-3 mb-8 no-print">
        <input id="inTanggal" type="text" placeholder="Tanggal" class="input-dark w-full px-5 py-4 rounded-2xl font-semibold outline-none focus:ring-2 ring-indigo-500/50">
        <input id="inNota" type="text" placeholder="No Nota" class="input-dark w-full px-5 py-4 rounded-2xl font-semibold outline-none focus:ring-2 ring-indigo-500/50">
        <input id="inPanjang" type="number" placeholder="Panjang" class="input-dark w-full px-5 py-4 rounded-2xl font-semibold outline-none focus:ring-2 ring-indigo-500/50">
        <button onclick="tambahData()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-extrabold flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            TAMBAH
        </button>
    </div>

    <!-- Table Section -->
    <div class="px-4 overflow-x-auto no-scrollbar">
        <table class="w-full text-left">
            <thead>
                <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-white/5">
                    <th class="py-3 px-2">No</th>
                    <th class="py-3 px-2">Tanggal</th>
                    <th class="py-3 px-2">No Nota</th>
                    <th class="py-3 px-2 text-right">Panjang</th>
                    <th class="py-3 px-2 text-center no-print">Aksi</th>
                </tr>
            </thead>
            <tbody id="dataBody">
                <!-- Baris data akan muncul di sini -->
            </tbody>
        </table>
    </div>

    <!-- Floating Bottom Bar (Sama seperti di video) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/80 backdrop-blur-xl border-t border-white/5 no-print">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex flex-col">
                <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Total Akumulasi</span>
                <div class="flex items-baseline gap-1">
                    <span id="totalDisplay" class="text-3xl font-black italic text-white leading-none">0</span>
                    <span class="text-[10px] font-bold text-slate-500 uppercase">m</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <!-- Tombol Excel -->
                <button onclick="exportExcel()" class="bg-emerald-500/20 p-3 rounded-xl border border-emerald-500/30 text-emerald-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>
                </button>
                <!-- Tombol PDF/Print -->
                <button onclick="window.print()" class="bg-red-500/20 p-3 rounded-xl border border-red-500/30 text-red-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
                </button>
                <!-- Tombol Simpan -->
                <button class="bg-white text-slate-900 px-6 py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg">
                    SIMPAN
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data Awal
        let stockData = [
            { tgl: '25/3', nota: '183397', panjang: 14 },
            { tgl: '25/3', nota: '183407', panjang: 3 },
            { tgl: '25/3', nota: '183403', panjang: 2 },
            { tgl: '25/3', nota: '183395', panjang: 32 },
        ];

        function updateUI() {
            const body = document.getElementById('dataBody');
            const totalDisplay = document.getElementById('totalDisplay');
            const targetVal = document.getElementById('targetVal').value;
            const statusIcon = document.getElementById('statusIcon');
            
            body.innerHTML = '';
            let total = 0;

            stockData.forEach((item, index) => {
                total += Number(item.panjang);
                body.innerHTML += `
                    <tr class="border-b border-white/5 group">
                        <td class="py-4 px-2 text-xs font-bold text-slate-600">${index + 1}</td>
                        <td class="py-4 px-2 text-sm font-semibold">${item.tgl}</td>
                        <td class="py-4 px-2 text-sm font-bold text-indigo-400">#${item.nota}</td>
                        <td class="py-4 px-2 text-right font-black text-lg italic text-white">${item.panjang}<span class="text-[8px] ml-1 opacity-20">m</span></td>
                        <td class="py-4 px-2 text-center no-print">
                            <button onclick="hapusData(${index})" class="text-slate-700 hover:text-red-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                            </button>
                        </td>
                    </tr>
                `;
            });

            totalDisplay.innerText = total;

            // Update Icon Status
            if (total >= targetVal) {
                statusIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
            } else {
                statusIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>';
            }
        }

        function tambahData() {
            const tgl = document.getElementById('inTanggal').value;
            const nota = document.getElementById('inNota').value;
            const pjg = document.getElementById('inPanjang').value;

            if (!nota || !pjg) return;

            stockData.push({ tgl: tgl || '-', nota: nota, panjang: pjg });
            updateUI();

            // Reset input
            document.getElementById('inNota').value = '';
            document.getElementById('inPanjang').value = '';
        }

        function hapusData(index) {
            stockData.splice(index, 1);
            updateUI();
        }

        function exportExcel() {
            let csv = 'No,Tanggal,No Nota,Panjang\n';
            stockData.forEach((d, i) => csv += `${i+1},${d.tgl},${d.nota},${d.panjang}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Rekap_Kartu_Stock.csv';
            a.click();
        }

        // Jalankan UI pertama kali
        updateUI();
    </script>
</body>
</html>
